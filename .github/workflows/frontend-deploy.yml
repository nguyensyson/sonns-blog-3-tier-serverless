name: Frontend deploy (prod)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Bucket name / distribution ID come from repo secrets (S3_BUCKET_NAME,
      # CLOUDFRONT_DISTRIBUTION_ID) instead of being read from Terraform
      # state - copy them from `terraform output` after each manual
      # `terraform apply` if they ever change (see terraform/README.md).
      - name: Sync to S3
        run: aws s3 sync frontend/dist "s3://${{ secrets.S3_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
