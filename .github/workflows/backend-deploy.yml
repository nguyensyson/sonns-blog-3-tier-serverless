name: Backend deploy (prod)

# Split ownership since the SAM migration (see sam/README.md):
#   - Terraform still owns DynamoDB, S3 (images), Secrets Manager, CloudFront,
#     ACM, Route53, and the account-level API Gateway CloudWatch role.
#   - SAM now owns the 3 Lambda functions, the shared layer, and the REST API
#     (previously terraform/modules/lambda, lambda-layer, api-gateway,
#     cloudwatch - all deleted).
#
# Deploy order matters: Terraform must run BEFORE `sam deploy` (SAM reads
# table/bucket/secret names via {{resolve:ssm:...}} from SSM parameters
# Terraform writes) AND AFTER it (CloudFront's API origin is only known once
# SAM has created the REST API - see terraform/README.md "SSM bridge").
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "sam/**"
      - "terraform/modules/**"
      - "terraform/environments/prod/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install test dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # One pytest invocation per module - modules/*/main.py all import under
      # the plain name "main", so running them together in one process makes
      # later imports shadow earlier ones via sys.modules caching.
      - name: Test user module
        working-directory: backend
        run: pytest tests/user

      - name: Test posts module
        working-directory: backend
        run: pytest tests/posts

      - name: Test tasks module
        working-directory: backend
        run: pytest tests/tasks

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # terraform.tfvars is gitignored by design (see terraform/README.md) -
      # regenerated here from repo Variables (none of these values are
      # secret; the JWT secret itself lives in Secrets Manager, set out of
      # band, never in tfvars).
      - name: Write terraform.tfvars
        working-directory: terraform/environments/prod
        run: |
          cat > terraform.tfvars <<EOF
          aws_region   = "${{ vars.AWS_REGION }}"
          project_name = "${{ vars.PROJECT_NAME }}"
          environment  = "prod"
          owner        = "${{ vars.OWNER }}"
          cost_center  = "${{ vars.COST_CENTER }}"

          root_domain_name    = "${{ vars.ROOT_DOMAIN_NAME }}"
          site_domain_name    = "${{ vars.SITE_DOMAIN_NAME }}"
          create_route53_zone = false

          dynamodb_billing_mode = "PAY_PER_REQUEST"

          secret_description = "JWT signing secret and other API keys/credentials for the Lambda backend (prod)."

          manage_apigateway_account_settings = true
          EOF

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: terraform init

      # Pass 1: create/update DynamoDB, S3, Secrets Manager, IAM account
      # settings, and the SSM parameters SAM is about to read. CloudFront's
      # API origin will still point at last known value (or the bootstrap
      # placeholder on a brand-new environment) until pass 2, below.
      - name: Terraform apply (base infra + SSM bridge)
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve

      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: sam/.aws-sam/cache
          key: sam-cache-prod-${{ hashFiles('backend/layers/common/requirements.txt') }}

      - name: sam validate
        working-directory: sam
        run: sam validate --lint --region "${{ env.AWS_REGION }}"

      - name: sam build
        working-directory: sam
        run: sam build # cached/parallel/use_container come from samconfig.toml [default.build.parameters]

      - name: sam deploy
        working-directory: sam
        run: >
          sam deploy
          --config-file env/prod.toml --config-env prod
          --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Show stack events on failed deploy
        if: failure()
        working-directory: sam
        run: >
          aws cloudformation describe-stack-events
          --stack-name sonns-blogs-prod-backend
          --region "${{ env.AWS_REGION }}"
          --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[LogicalResourceId,ResourceStatusReason]"
          --output table

      # SAM's CloudFormation stack has now created the REST API; publish its
      # regional domain name to the SSM parameter Terraform's CloudFront
      # module reads (see sam/scripts/publish-api-domain.sh and
      # terraform/environments/prod/main.tf "SSM bridge (SAM -> Terraform)").
      - name: Publish API Gateway domain to SSM
        run: ./sam/scripts/publish-api-domain.sh "${{ vars.PROJECT_NAME }}" prod sonns-blogs-prod-backend "${{ env.AWS_REGION }}"

      # Pass 2: now that the SSM parameter above holds the real API domain,
      # update CloudFront's origin to point at it. No-op if the domain didn't
      # change since the last deploy (the common case).
      - name: Terraform apply (finalize CloudFront origin)
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve
