name: Backend deploy (prod)

# Split ownership since the SAM migration (see sam/README.md):
#   - Terraform owns DynamoDB, S3 (images), Secrets Manager, CloudFront, ACM,
#     Route53, and the account-level API Gateway CloudWatch role. It is
#     applied manually by a dev (see terraform/README.md) - NOT by this
#     workflow - so infra changes are deliberate and reviewed before they hit
#     prod.
#   - SAM owns the 3 Lambda functions, the shared layer, and the REST API
#     (previously terraform/modules/lambda, lambda-layer, api-gateway,
#     cloudwatch - all deleted). This workflow only redeploys those.
#
# SAM reads table/bucket/secret names via {{resolve:ssm:...}} directly from
# SSM parameters that Terraform already wrote on a prior manual apply - it
# does not need Terraform to run in this pipeline. The one exception is
# CloudFront's API origin, which is only known once SAM has created the REST
# API; publish-api-domain.sh (below) keeps that SSM parameter fresh so the
# next manual `terraform apply` picks it up (see terraform/README.md "SSM
# bridge").
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "sam/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install test dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # One pytest invocation per module - modules/*/main.py all import under
      # the plain name "main", so running them together in one process makes
      # later imports shadow earlier ones via sys.modules caching.
      - name: Test user module
        working-directory: backend
        run: pytest tests/user

      - name: Test posts module
        working-directory: backend
        run: pytest tests/posts

      - name: Test tasks module
        working-directory: backend
        run: pytest tests/tasks

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: sam/.aws-sam/cache
          key: sam-cache-prod-${{ hashFiles('backend/layers/common/requirements.txt') }}

      - name: sam validate
        working-directory: sam
        run: sam validate --lint --region "${{ env.AWS_REGION }}"

      - name: sam build
        working-directory: sam
        run: sam build # cached/parallel/use_container come from samconfig.toml [default.build.parameters]

      - name: sam deploy
        working-directory: sam
        run: >
          sam deploy
          --config-file env/prod.toml --config-env prod
          --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Show stack events on failed deploy
        if: failure()
        working-directory: sam
        run: >
          aws cloudformation describe-stack-events
          --stack-name sonns-blogs-prod-backend
          --region "${{ env.AWS_REGION }}"
          --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[LogicalResourceId,ResourceStatusReason]"
          --output table

      # SAM's CloudFormation stack has now created the REST API; publish its
      # regional domain name to the SSM parameter Terraform's CloudFront
      # module reads (see sam/scripts/publish-api-domain.sh and
      # terraform/environments/prod/main.tf "SSM bridge (SAM -> Terraform)").
      # Terraform isn't applied here - a dev applies it manually and will pick
      # up this value on their next `terraform apply`.
      - name: Publish API Gateway domain to SSM
        run: ./sam/scripts/publish-api-domain.sh "${{ vars.PROJECT_NAME }}" prod sonns-blogs-prod-backend "${{ env.AWS_REGION }}"
