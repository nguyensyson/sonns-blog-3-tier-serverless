openapi: "3.0.1"
info:
  title: sonns-blogs-api
  version: "1.0"

# Mirrors the old Terraform api-gateway module route map 1:1:
#   /auth/*  , /users/*  -> user function
#   /posts/*             -> posts function
#   /groups/* , /tasks/* -> tasks function
# Each prefix gets an exact-match path plus a {proxy+} catch-all, both
# AWS_PROXY (Lambda proxy) integrations with ANY method - auth/CORS/routing
# within a prefix is handled entirely by that function's own FastAPI app, not
# by API Gateway.
#
# Function ARNs below (${UserFunction.Arn} etc.) are resolved by
# CloudFormation because template.yaml's Api resource pulls this file in via
# DefinitionBody + Fn::Transform: AWS::Include, which inlines it into the
# template body before intrinsic functions are evaluated - see ../README.md.
# (A plain DefinitionUri does NOT do this: CloudFormation hands that content
# to API Gateway as an opaque S3-hosted body, so !Sub is never resolved.)

paths:
  /auth:
    x-amazon-apigateway-any-method:
      responses: {}
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UserFunction.Arn}/invocations"
  /auth/{proxy}:
    parameters:
      - name: proxy
        in: path
        required: true
        schema:
          type: string
    x-amazon-apigateway-any-method:
      responses: {}
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UserFunction.Arn}/invocations"

  /users:
